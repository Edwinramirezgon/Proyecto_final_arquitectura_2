server.port=8084
spring.application.name=pollution-analytics
server.tomcat.use-relative-redirects=true
spring.mvc.async.request-timeout=60000

spring.datasource.url=jdbc:postgresql://timescaledb:5432/pollutiondb?sslmode=disable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

zone.service.url=http://zone-service:8082
auth.service.url=http://auth-service:8081
emergency.alert.url=http://emergency-alert:8085
alert.queue.name=alert_queue
maintenance.queue.name=maintenance_queue

# ── Circuit Breakers ──────────────────────────────────────────────────────────
# auth-service: 3 llamadas, 50% fallos → abre por 10s
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=3
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.auth-service.record-exceptions=java.net.ConnectException,org.springframework.web.client.ResourceAccessException,java.net.SocketTimeoutException
resilience4j.circuitbreaker.instances.auth-service.ignore-exceptions=org.springframework.web.client.HttpClientErrorException

# zone-service: misma configuración
resilience4j.circuitbreaker.instances.zone-service.sliding-window-size=3
resilience4j.circuitbreaker.instances.zone-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.zone-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.zone-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.zone-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.zone-service.record-exceptions=java.net.ConnectException,org.springframework.web.client.ResourceAccessException,java.net.SocketTimeoutException
resilience4j.circuitbreaker.instances.zone-service.ignore-exceptions=org.springframework.web.client.HttpClientErrorException

# ── Swagger ──────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Observabilidad ────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.enable.rabbitmq=true
spring.rabbitmq.listener.simple.missing-queues-fatal=false
management.endpoint.health.show-details=always
management.metrics.tags.application=pollution-analytics
management.tracing.sampling.probability=1.0
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.opentelemetry.resource-attributes.service.name=pollution-analytics
