server.port=8085
spring.application.name=emergency-alert

spring.datasource.url=jdbc:postgresql://postgres:5432/alertdb?sslmode=disable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

alert.queue.name=alert_queue
maintenance.queue.name=maintenance_queue
auth.notification.queue=auth_notification_queue
alert.technical.email=${GMAIL_USERNAME}
auth.service.url=http://auth-service:8081

# ── Swagger ──────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Observabilidad ────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.enable.rabbitmq=true
spring.rabbitmq.listener.simple.missing-queues-fatal=false
management.endpoint.health.show-details=always
management.metrics.tags.application=emergency-alert
management.tracing.sampling.probability=1.0
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.opentelemetry.resource-attributes.service.name=emergency-alert
